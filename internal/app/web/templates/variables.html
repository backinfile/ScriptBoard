<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/assets/app.css?v=6"><script defer src="/assets/app-v2.js?v=6"></script><title>变量 · ScriptBoard</title></head>
<body><main><header class="workspace-heading"><h1>变量</h1><p>集中维护可在脚本参数模板中引用的运行变量。</p></header><details class="creator"><summary><span><strong>创建变量</strong><small>名称使用大写字母、数字与下划线，最多 64 个字符</small></span></summary><form class="creator-form" method="post" action="/variables"><input type="hidden" name="csrf_token" value="{{.CSRFToken}}"><label class="wide-field">名称 <input name="name" placeholder="例如：BACKUP_PATH" pattern="[A-Z][A-Z0-9_]{0,63}" required></label><label>值 <textarea name="value" maxlength="4096" placeholder="输入变量值"></textarea></label><button type="submit">创建变量</button></form></details>
<div class="table-shell"><table><thead><tr><th>名称与值</th><th>操作</th></tr></thead><tbody>{{range .Variables}}<tr><td><form class="variable-editor" method="post" action="/variables/{{.Name}}/update"><input type="hidden" name="csrf_token" value="{{$.CSRFToken}}"><input name="name" value="{{.Name}}" aria-label="变量名称" pattern="[A-Z][A-Z0-9_]{0,63}" required><textarea name="value" aria-label="变量值" maxlength="4096">{{.Value}}</textarea><button>保存</button></form></td><td><form method="post" action="/variables/{{.Name}}/delete"><input type="hidden" name="csrf_token" value="{{$.CSRFToken}}"><button name="confirm" value="yes">删除</button></form></td></tr>{{else}}<tr><td colspan="2">暂无变量</td></tr>{{end}}</tbody></table></div>
<nav class="pagination" aria-label="变量分页"><span class="pagination__summary">共 {{.Pagination.Total}} 条 · 第 {{.Pagination.Page}} / {{.Pagination.PageCount}} 页</span><span class="pagination__actions">{{if .Pagination.HasPrevious}}<a href="{{.Pagination.PreviousURL}}">← 上一页</a>{{else}}<span class="pagination__disabled">← 上一页</span>{{end}}{{if .Pagination.HasNext}}<a href="{{.Pagination.NextURL}}">下一页 →</a>{{else}}<span class="pagination__disabled">下一页 →</span>{{end}}</span></nav></main></body></html>
