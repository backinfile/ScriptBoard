name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version label
        required: true
        default: development
jobs:
  portable-archives:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        shell: pwsh
        run: go test ./... -count=1
      - name: Build archives and checksums
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: scriptboard-portable-archives
          path: dist/*
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
